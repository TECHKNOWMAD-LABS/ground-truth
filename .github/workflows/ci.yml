name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Restrict GITHUB_TOKEN to read-only at workflow level. Jobs that need
# write access (publish, deploy) declare their own `permissions:` block.
permissions:
  contents: read

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment and install dependencies
        run: |
          uv venv .venv
          uv pip install -e ".[dev]" pytest pytest-cov hypothesis ruff mypy

      - name: Lint with ruff (check only)
        run: .venv/bin/ruff check src/ tests/

      - name: Run tests with coverage
        run: |
          .venv/bin/pytest -v --tb=short --cov=groundtruth --cov-report=term-missing --cov-fail-under=95

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
